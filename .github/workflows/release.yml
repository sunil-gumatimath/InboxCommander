name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Leave empty to use the current HEAD tag.'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build & package extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync manifest version to tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "Setting manifest version to $TAG"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$TAG\"/" src/manifest.json
          head -7 src/manifest.json

      - name: Build
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
        run: bun run build

      - name: Package extension zip
        run: |
          mkdir -p dist-package
          cp manifest.json service-worker-loader.js dist-package/
          cp -r assets content options popup sidepanel dist-package/
          cd dist-package
          zip -r ../inboxcommander-${{ github.ref_name }}.zip .
          cd ..
          ls -la inboxcommander-${{ github.ref_name }}.zip

      - name: Generate store icons
        run: |
          mkdir -p store-icons
          cp src/assets/icons/logo.png store-icons/icon-128.png
          cp src/assets/icons/logo.png store-icons/icon-48.png
          cp src/assets/icons/logo.png store-icons/icon-16.png
          ls -la store-icons/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            inboxcommander-${{ github.ref_name }}.zip
            store-icons/*.png
          fail_on_unmatched_files: false
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
