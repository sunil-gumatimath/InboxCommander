<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a85e0"/>
      <stop offset="100%" stop-color="#5e6ad2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Envelope body -->
  <g filter="url(#soft)">
    <rect x="28" y="40" width="72" height="48" rx="6" fill="#ffffff"/>
    <!-- Envelope flap (V) -->
    <path d="M 28 44 L 64 70 L 100 44"
          stroke="#5e6ad2" stroke-width="3"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- AI sparkle (top right) -->
  <g transform="translate(90 32)">
    <path d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z"
          fill="#ffffff"/>
  </g>

  <!-- Secondary smaller sparkle -->
  <g transform="translate(102 56)" opacity="0.7">
    <path d="M 0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z"
          fill="#ffffff"/>
  </g>
</svg>
